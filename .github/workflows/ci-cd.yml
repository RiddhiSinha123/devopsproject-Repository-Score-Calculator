name: DevOps CI Pipeline

on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Matches your local 3.12.3

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx 

      - name: Lint Code (Style Check)
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Execute Test Suite
        run: python -m pytest src/tests/

      - name: Verify Docker Build
        # Note the specific path to your Dockerfile
        run: docker build -t api-test -f infrastructure/docker/Dockerfile .

      - name: Validate Docker Compose Configuration
        # Verifies the YAML syntax of your orchestration file
        run: docker compose -f infrastructure/docker/docker-compose.yml config
