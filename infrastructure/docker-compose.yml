services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: git-health-scorer
    ports:
      - "8000:8000"
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-devops-secret-123}
      - PYTHONUNBUFFERED=1
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3